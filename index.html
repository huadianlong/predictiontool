<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>风险预测工具</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft Yahei", system-ui, sans-serif;
        }
        body {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 20px;
            background-color: #f8fafc;
        }
        h1 {
            color: #1677ff;
            text-align: center;
        }
        .form-item {
            margin: 22px 0;
        }
        .form-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            color: #222;
        }
        .form-item input {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
        }
        .form-item:first-child input {
            border-color: #4096ff;
            box-shadow: 0 0 0 3px rgba(64, 150, 255, 0.15);
        }
        .btn-row {
            display: flex;
            gap: 12px;
            margin: 10px 0 28px;
        }
        #predict-btn {
            flex: 1;
            background-color: #006cfa;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 0;
            font-size: 17px;
            cursor: pointer;
        }
        #predict-btn:hover {
            background-color: #025fe0;
        }
        #clear-btn {
            width: 140px;
            background-color: #f0f2f5;
            color: #333;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            padding: 14px 0;
            font-size: 17px;
            cursor: pointer;
        }
        #clear-btn:hover {
            background-color: #e5e7eb;
        }
        .intro-block {
            background: #ffffff;
            padding: 18px;
            border-radius: 10px;
        }
        .intro-block h2 {
            color: #1677ff;
            margin-top: 0;
            font-size: 22px;
        }
        .disclaimer {
            margin-top: 14px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        /* 动态变色结果卡片 */
        #result-box {
            display: none;
            padding: 22px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .risk-low {background:#ecfdf3;border:1px solid #22c55e;}
        .risk-mid {background:#fff7ed;border:1px solid #f97316;}
        .risk-high {background:#fef2f2;border:1px solid #ef4444;}
        #result-box h3 {margin:0 0 12px 0}
        .result-row {margin:8px 0;font-size:16px}
    </style>
</head>
<body>
<h1>肺结核合并糖尿病患者营养不良风险预测工具</h1>

<div class="form-item">
    <label>年龄(Age，岁):</label>
    <input id="age" type="number" placeholder="取值区间：18~110，参考模板：58" min="18" max="110">
</div>
<div class="form-item">
    <label>病程(COD，月):</label>
    <input id="cod" type="number" placeholder="取值区间：0~360，参考模板：36" min="0" max="360">
</div>
<div class="form-item">
    <label>糖化血红蛋白(HbA1c，%):</label>
    <input id="hba1c" type="number" step="0.01" placeholder="取值区间：3.0~18.0，参考模板：8.75" min="3.0" max="18.0">
</div>
<div class="form-item">
    <label>查尔森并发症指数(CCI，分):</label>
    <input id="cci" type="number" placeholder="取值区间：0~30，参考模板：3" min="0" max="30">
</div>
<div class="form-item">
    <label>衰弱状况(FRAIL，分):</label>
    <input id="frail" type="number" placeholder="取值区间：0~5，参考模板：2" min="0" max="5">
</div>

<div class="btn-row">
    <button id="predict-btn">开始预测</button>
    <button id="clear-btn">清空重置</button>
</div>

<div id="result-box">
    <h3>预测结果</h3>
    <div class="result-row">综合得分：p=<span id="x-val"></span></div>
    <div class="result-row">营养不良发生概率：<span id="p-percent"></span></div>
    <div class="result-row">风险判定：<strong id="risk-text"></strong></div>
</div>

<div class="intro-block">
    <h2>工具简介</h2>
    <p>本工具基于风险预测模型构建，使用临床数据（年龄、病程、糖化血红蛋白、查尔森并发症指数、衰弱状况）开展肺结核合并糖尿病患者营养不良风险的评估。</p>
    <p>参考文献：刘玲, 等. 肺结核合并糖尿病患者营养不良预测模型的构建与验证[J]. 中国防痨杂志, 2024, 46(8): 903-909.</p>
    <p class="disclaimer">免责声明：本工具仅可用于科研场景做风险辅助参考，输出内容不能替代医院医师的专业诊断、线下诊疗评估，请勿仅凭网页结果自行开展诊疗决策。</p>
</div>

<script>
const predictBtn = document.querySelector("#predict-btn");
const clearBtn = document.querySelector("#clear-btn");
const resultBox = document.querySelector("#result-box");
const xValDom = document.querySelector("#x-val");
const pPercentDom = document.querySelector("#p-percent");
const riskTextDom = document.querySelector("#risk-text");
const inputList = document.querySelectorAll("input");

// ==========新增：手机输入框自动滚动防遮挡逻辑==========
inputList.forEach(input => {
    input.addEventListener("focus", function(){
        // 延迟300毫秒，等待手机软键盘完全弹出再滚动
        setTimeout(() => {
            // 平滑滚动，当前输入框自动到屏幕中间，避开底部键盘
            this.scrollIntoView({
                behavior: "smooth",
                block: "center"
            });
        }, 300);
    })
})

// 预测计算逻辑
predictBtn.addEventListener("click", ()=>{
    // 读取表单输入
    const age = parseFloat(document.getElementById("age").value);
    const cod = parseFloat(document.getElementById("cod").value);
    const hba1c = parseFloat(document.getElementById("hba1c").value);
    const cci = parseFloat(document.getElementById("cci").value);
    const frail = parseFloat(document.getElementById("frail").value);

    // 空值合法性校验
    const fieldList = [
        {v:age,name:"年龄"},{v:cod,name:"病程"},{v:hba1c,name:"糖化血红蛋白"},
        {v:cci,name:"查尔森并发症指数"},{v:frail,name:"衰弱状况"}
    ];
    for (const item of fieldList) {
        if (isNaN(item.v)) {
            alert(`【${item.name}】不能为空，请补充合法数值`);
            return;
        }
    }

    // 严格套用最新线性公式
    const X = -6.333 + 0.071 * age + 0.576 * cod + 0.074 * hba1c + 0.081 * cci + 0.079 * frail;
    // sigmoid概率换算
    const P = 1 / (1 + Math.exp(-X));
    const percentText = (P * 100).toFixed(2) + "%";

    // 风险等级+卡片配色分配
    let riskLevel, themeClass;
    if (P < 0.3) {
        riskLevel = "低营养不良风险";
        themeClass = "risk-low";
    } else if (P < 0.7) {
        riskLevel = "中等营养不良风险";
        themeClass = "risk-mid";
    } else {
        riskLevel = "高营养不良风险";
        themeClass = "risk-high";
    }

    // 页面回填展示结果
    resultBox.className = themeClass;
    resultBox.style.display = "block";
    xValDom.innerText = X.toFixed(3);
    pPercentDom.innerText = percentText;
    riskTextDom.innerText = riskLevel;
})

// 清空重置逻辑
clearBtn.addEventListener("click", ()=>{
    // 清空所有输入框
    inputList.forEach(input => input.value = "");
    // 隐藏结果面板
    resultBox.style.display = "none";
})
</script>
</body>
</html>
